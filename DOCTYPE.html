<!DOCTYPE html>
<html>
<head>
    <title>Grandma's Pill Helper</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; width: 380px; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        button:hover { background: #27ae60; }
        .pill-list { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        .pill-item { background: #fff; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #2ecc71; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .time-badge { background: #3498db; color: white; padding: 4px 8px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>💊 Pill Scheduler</h2>
    
    <label>Pill Name:</label>
    <input type="text" id="pillName" placeholder="Search or type name...">
    
    <label>Dispense Time:</label>
    <input type="time" id="pillTime">

    <button onclick="addPill()">Schedule Now</button>

    <div class="pill-list" id="pillList">
        <p style="color: #999; text-align: center;" id="emptyMsg">No pills scheduled yet.</p>
    </div>
</div>

<script>
    function addPill() {
        const name = document.getElementById('pillName').value;
        const time = document.getElementById('pillTime').value;

        if (name === "" || time === "") {
            alert("Please enter the name and time for Grandma's medicine.");
            return;
        }

        // Hide the "empty" message
        document.getElementById('emptyMsg').style.display = 'none';

        const list = document.getElementById('pillList');
        const entry = document.createElement('div');
        entry.className = 'pill-item';
        
        // Format the time to look nicer
        entry.innerHTML = `
            <span><strong>${name}</strong></span>
            <span class="time-badge">${time}</span>
        `;
        
        list.appendChild(entry);

        // Clear boxes
        document.getElementById('pillName').value = "";
        document.getElementById('pillTime').value = "";
    }
</script>

</body>
</html>
